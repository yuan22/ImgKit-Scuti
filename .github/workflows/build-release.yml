name: 正式版发布

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 1.2.3 或 v1.2.3"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: 准备发布信息
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      release_body: ${{ steps.notes.outputs.release_body }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算 Tag 与版本
        id: vars
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            raw_version="${{ github.event.inputs.version }}"
            if [[ ! "$raw_version" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::版本号格式无效: '$raw_version'，请使用 1.2.3 或 v1.2.3"
              exit 1
            fi

            version="${raw_version#v}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Tag 格式无效: '$tag'，应为 v1.2.3"
              exit 1
            fi

            version="${tag#v}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: 读取更新日志
        id: notes
        shell: bash
        run: |
          notes_file=".github/CHANGELOG.md"
          if [ ! -f "$notes_file" ]; then
            echo "::error::未找到更新日志文件: $notes_file"
            exit 1
          fi

          {
            echo "release_body<<EOF"
            cat "$notes_file"
            echo
            echo "## 支持平台"
            echo "- Windows x64"
            echo "- Windows arm64"
            echo "- Linux x64"
            echo "- Linux arm64"
            echo "- Android x64"
            echo "- Android arm64"
            echo "- macOS arm64"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## 发布正文预览"
            echo
            cat "$notes_file"
            echo
            echo "## 支持平台"
            echo "- Windows x64"
            echo "- Windows arm64"
            echo "- Linux x64"
            echo "- Linux arm64"
            echo "- Android x64"
            echo "- Android arm64"
            echo "- macOS arm64"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "========== Release Body Preview =========="
          cat "$notes_file"
          echo
          echo "## 支持平台"
          echo "- Windows x64"
          echo "- Windows arm64"
          echo "- Linux x64"
          echo "- Linux arm64"
          echo "- Android x64"
          echo "- Android arm64"
          echo "- macOS arm64"
          echo "=========================================="

  build_windows:
    name: 构建 Windows-${{ matrix.arch }}
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 配置 Cargo 缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: 构建
        shell: bash
        run: cargo build --release --target "${{ matrix.target }}"

      - name: 准备产物
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/imgkit_scuti.exe" "dist/imgkit_scuti-windows-${{ matrix.arch }}.exe"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: imgkit_scuti-windows-${{ matrix.arch }}
          path: dist/*
          retention-days: 90

  build_linux:
    name: 构建 Linux-${{ matrix.arch }}
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 Linux ARM64 交叉编译工具链
        if: matrix.arch == 'arm64'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: 配置 Cargo 缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: 构建
        shell: bash
        run: cargo build --release --target "${{ matrix.target }}"

      - name: 准备产物
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/imgkit_scuti" "dist/imgkit_scuti-linux-${{ matrix.arch }}"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: imgkit_scuti-linux-${{ matrix.arch }}
          path: dist/*
          retention-days: 90

  build_android:
    name: 构建 Android-${{ matrix.arch }}
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-linux-android
          - arch: x64
            target: x86_64-linux-android
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: 配置 Android 编译环境
        shell: bash
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "AR_x86_64_linux_android=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            linker="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang"
            echo "CC_aarch64_linux_android=$linker" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$linker" >> "$GITHUB_ENV"
          else
            linker="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android34-clang"
            echo "CC_x86_64_linux_android=$linker" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$linker" >> "$GITHUB_ENV"
          fi

      - name: 配置 Cargo 缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: 构建
        shell: bash
        run: cargo build --release --target "${{ matrix.target }}"

      - name: 准备产物
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/imgkit_scuti" "dist/imgkit_scuti-android-${{ matrix.arch }}"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: imgkit_scuti-android-${{ matrix.arch }}
          path: dist/*
          retention-days: 90

  build_macos:
    name: 构建 macOS-arm64
    needs: prepare
    runs-on: macos-14
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: 配置 Cargo 缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: release-aarch64-apple-darwin

      - name: 构建
        shell: bash
        run: cargo build --release --target aarch64-apple-darwin

      - name: 准备产物
        shell: bash
        run: |
          mkdir -p dist
          cp "target/aarch64-apple-darwin/release/imgkit_scuti" "dist/imgkit_scuti-macos-arm64"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: imgkit_scuti-macos-arm64
          path: dist/*
          retention-days: 90

  release:
    name: 发布正式版
    needs:
      - prepare
      - build_windows
      - build_linux
      - build_android
      - build_macos
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 整理发布文件
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -lh release/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ImgKit-Scuti ${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.release_body }}
          files: release/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
